name: source-change-detection

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Diff sources against baseline
        run: |
          binwise check-sources --json > /tmp/diffs.json
          binwise check-sources || true
      - name: Open or update issues for drifted sources
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/source-change-issue.py /tmp/diffs.json
